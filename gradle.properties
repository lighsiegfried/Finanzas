# Gradle daemon JVM options.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
# Run independent tasks/projects in parallel.
org.gradle.parallel=true
# Reuse build outputs across builds.
org.gradle.caching=true

# Use AndroidX artifacts.
android.useAndroidX=true
# Generate non-transitive R classes (smaller, faster incremental builds).
android.nonTransitiveRClass=true
# Silence the "compileSdk has not been tested" guard for API 36.
android.suppressUnsupportedCompileSdk=36

# Kotlin official code style.
kotlin.code.style=official
